name: Supabase Migrations

# PR dry-run only. Production apply runs in the Release workflow (deploy.yml)
# on every push to main so prod always matches the repo (migrations, ref data,
# edge functions, auth templates) — not only when migration paths change.

on:
  pull_request:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
      - 'supabase/functions/**'
      - 'scripts/prod-demo-cleanup.sql'
      - 'scripts/prod-release-verify.sql'
      - '.github/workflows/migrations.yml'
      - '.github/workflows/deploy.yml'

jobs:
  dry-run:
    name: Migration dry-run (PR)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link to prod project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase link \
            --project-ref "${{ secrets.SUPABASE_PROD_PROJECT_REF }}" \
            --password "${{ secrets.SUPABASE_PROD_DB_PASSWORD }}"

      - name: Show pending migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          echo "::group::Migrations pending on prod"
          supabase migration list --linked || true
          echo "::endgroup::"
