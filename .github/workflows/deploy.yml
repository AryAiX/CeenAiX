name: Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      target:
        description: Deploy target
        required: true
        default: production
        type: choice
        options:
          - production
          - dev

jobs:
  preview:
    name: Dev Preview Deploy
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && inputs.target == 'dev')

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Pull Vercel Environment Information
        run: |
          VERCEL_TOKEN_CLEAN="$(python - <<'PY'
          import base64
          import os
          print(base64.b64decode(os.environ["VERCEL_TOKEN_B64"]).decode().strip())
          PY
          )"
          export VERCEL_TOKEN="$VERCEL_TOKEN_CLEAN"
          npx vercel@50.1.3 pull --yes --environment=production --token "$VERCEL_TOKEN_CLEAN"
        env:
          VERCEL_TOKEN_B64: ${{ secrets.VERCEL_TOKEN_B64 }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Disable Vercel deployment protection for public dev URL
        run: |
          VERCEL_TOKEN_CLEAN="$(python - <<'PY'
          import base64
          import os
          print(base64.b64decode(os.environ["VERCEL_TOKEN_B64"]).decode().strip())
          PY
          )"
          status="$(curl -sS -o /tmp/vercel-project-update.json -w "%{http_code}" \
            -X PATCH "https://api.vercel.com/v9/projects/${VERCEL_PROJECT_ID}?teamId=${VERCEL_ORG_ID}" \
            -H "Authorization: Bearer ${VERCEL_TOKEN_CLEAN}" \
            -H "Content-Type: application/json" \
            --data '{"ssoProtection":null,"passwordProtection":null}')"
          cat /tmp/vercel-project-update.json
          if [ "$status" -lt 200 ] || [ "$status" -ge 300 ]; then
            echo "Failed to update Vercel project protection settings (HTTP $status)"
            exit 1
          fi
        env:
          VERCEL_TOKEN_B64: ${{ secrets.VERCEL_TOKEN_B64 }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build Public Dev Artifacts
        run: |
          VERCEL_TOKEN_CLEAN="$(python - <<'PY'
          import base64
          import os
          print(base64.b64decode(os.environ["VERCEL_TOKEN_B64"]).decode().strip())
          PY
          )"
          export VERCEL_TOKEN="$VERCEL_TOKEN_CLEAN"
          npx vercel@50.1.3 build --prod --token "$VERCEL_TOKEN_CLEAN"
        env:
          VERCEL_TOKEN_B64: ${{ secrets.VERCEL_TOKEN_B64 }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          # PR previews use the DEV Supabase project, never prod.
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_PREVIEW_PIN_GATE: "false"

      - name: Deploy Public Dev to Vercel
        id: deploy-preview
        run: |
          VERCEL_TOKEN_CLEAN="$(python - <<'PY'
          import base64
          import os
          print(base64.b64decode(os.environ["VERCEL_TOKEN_B64"]).decode().strip())
          PY
          )"
          export VERCEL_TOKEN="$VERCEL_TOKEN_CLEAN"
          # Production-target + --skip-domain makes the dev deployment public
          # without moving www.ceenaix.com away from the real prod deployment.
          url="$(npx vercel@50.1.3 deploy --prebuilt --prod --skip-domain --token "$VERCEL_TOKEN_CLEAN" | tail -n 1)"
          echo "url=$url" >> "$GITHUB_OUTPUT"
          echo "Preview URL: $url"
        env:
          VERCEL_TOKEN_B64: ${{ secrets.VERCEL_TOKEN_B64 }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Alias stable dev URL
        run: |
          VERCEL_TOKEN_CLEAN="$(python - <<'PY'
          import base64
          import os
          print(base64.b64decode(os.environ["VERCEL_TOKEN_B64"]).decode().strip())
          PY
          )"
          export VERCEL_TOKEN="$VERCEL_TOKEN_CLEAN"
          npx vercel@50.1.3 alias set "${{ steps.deploy-preview.outputs.url }}" dev.ceenaix.com --token "$VERCEL_TOKEN_CLEAN"
        env:
          VERCEL_TOKEN_B64: ${{ secrets.VERCEL_TOKEN_B64 }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Comment preview URL
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.deploy-preview.outputs.url }}';
            if (!url) return;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `Preview deploy (DEV DB): ${url}\nStable dev URL: https://dev.ceenaix.com`
            });

  deploy:
    name: Production Deploy
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || (github.event_name == 'workflow_dispatch' && inputs.target == 'production')

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Pull Vercel Environment Information
        run: |
          VERCEL_TOKEN_CLEAN="$(python - <<'PY'
          import base64
          import os
          print(base64.b64decode(os.environ["VERCEL_TOKEN_B64"]).decode().strip())
          PY
          )"
          echo "Decoded Vercel token length: ${#VERCEL_TOKEN_CLEAN}"
          export VERCEL_TOKEN="$VERCEL_TOKEN_CLEAN"
          npx vercel@50.1.3 pull --yes --environment=production --token "$VERCEL_TOKEN_CLEAN"
        env:
          VERCEL_TOKEN_B64: ${{ secrets.VERCEL_TOKEN_B64 }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build Project Artifacts
        run: |
          VERCEL_TOKEN_CLEAN="$(python - <<'PY'
          import base64
          import os
          print(base64.b64decode(os.environ["VERCEL_TOKEN_B64"]).decode().strip())
          PY
          )"
          export VERCEL_TOKEN="$VERCEL_TOKEN_CLEAN"
          npx vercel@50.1.3 build --prod --token "$VERCEL_TOKEN_CLEAN"
        env:
          VERCEL_TOKEN_B64: ${{ secrets.VERCEL_TOKEN_B64 }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          # Force the static Vite bundle to compile against the prod Supabase
          # project even if the Vercel dashboard env is stale.
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_PROD_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_PROD_ANON_KEY }}
          VITE_PREVIEW_PIN_GATE: "false"

      - name: Deploy to Vercel
        run: |
          VERCEL_TOKEN_CLEAN="$(python - <<'PY'
          import base64
          import os
          print(base64.b64decode(os.environ["VERCEL_TOKEN_B64"]).decode().strip())
          PY
          )"
          export VERCEL_TOKEN="$VERCEL_TOKEN_CLEAN"
          npx vercel@50.1.3 deploy --prebuilt --prod --token "$VERCEL_TOKEN_CLEAN"
        env:
          VERCEL_TOKEN_B64: ${{ secrets.VERCEL_TOKEN_B64 }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

